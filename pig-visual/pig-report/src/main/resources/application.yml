server:
  port: 5005

spring:
  application:
    name: @artifactId@
  profiles:
    active: @profiles.active@
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:pig-register}:${NACOS_PORT:8848}
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        file-extension: yml
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    url: jdbc:mysql://${MYSQL_HOST:pig-mysql}:${MYSQL_PORT:3306}/jimureport?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

# 积木报表配置
jeecg:
  jmreport:
    # 报表设计器访问路径
    path:
      upload: /opt/jimureport
    # 是否禁用鼠标右键
    off:
      right:
        mouse: false
    # 是否禁止导出
    off:
      export:
        excel: false
        pdf: false
    # 自定义预览页面
    custom:
      preview:
        path:
    # 数据源安全模式
    safe:
      mode: false
    # 显示 API 接口
    api:
      show: true
